<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7eleven - لوحة التحكم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0a0a0a; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
        .btn-primary { background: linear-gradient(45deg, #C59D5F, #4B2C20); box-shadow: 0 4px 15px rgba(197, 157, 95, 0.2); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(197, 157, 95, 0.3); }
        .input-field { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; padding: 0.85rem; color: white; width: 100%; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); -webkit-appearance: none; }
        .input-field:focus { outline: none; border-color: #C59D5F; background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 0 4px rgba(197, 157, 95, 0.1); }
        select.input-field { padding-right: 2.5rem; }
        select.input-field option { background-color: #121212; color: white; padding: 12px; }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { background: rgba(255, 255, 255, 0.05); transform: scale(1.01); }
    </style>
</head>
<body class="p-4 sm:p-8">
    <!-- Password Overlay -->
    <div id="password-overlay" class="fixed inset-0 bg-black z-50 flex items-center justify-center">
        <div class="glass-card p-8 text-center max-w-sm w-full mx-4">
            <img src="logo.jpg" alt="Logo" class="w-16 h-16 rounded-full object-cover border-2 border-[#C59D5F] mx-auto mb-4">
            <h2 class="text-xl font-bold mb-6">لوحة التحكم <span class="text-[#C59D5F]">7eleven</span></h2>
            <input type="password" id="admin-password" class="input-field text-center mb-4" placeholder="أدخل كلمة السر">
            <button id="login-btn" onclick="var p=document.getElementById('admin-password').value;if(p==='937312401'){document.getElementById('password-overlay').style.display='none';document.getElementById('admin-content').classList.remove('hidden');document.getElementById('admin-content').classList.add('max-w-6xl','mx-auto');}else{document.getElementById('password-error').classList.remove('hidden');}" class="btn-primary w-full py-3 rounded-xl font-bold">دخول</button>
            <p id="password-error" class="text-red-500 mt-3 text-sm hidden">كلمة السر غير صحيحة</p>
        </div>
    </div>

    <!-- Admin Content -->
    <div id="admin-content" class="hidden">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-4">
                <img src="logo.jpg" alt="Logo" class="w-12 h-12 rounded-full object-cover border-2 border-[#C59D5F]">
                <h1 class="text-2xl font-bold">لوحة التحكم <span class="text-[#C59D5F]">7eleven</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleQRModal()" class="bg-[#C59D5F]/20 text-[#C59D5F] px-4 py-2 rounded-xl text-sm font-bold hover:bg-[#C59D5F]/30 transition-all flex items-center gap-2 border border-[#C59D5F]/30">
                    <i class="fa-solid fa-qrcode"></i>
                    QR Code
                </button>
                <a href="cashier.html" class="bg-green-600/20 text-green-500 px-4 py-2 rounded-xl text-sm font-bold hover:bg-green-600/30 transition-all flex items-center gap-2">
                    <i class="fa-solid fa-desktop"></i>
                    شاشة الكاشير
                </a>
                <a href="index.html" class="text-gray-400 hover:text-white transition-colors">
                    <i class="fa-solid fa-arrow-left ml-2"></i> العودة للموقع
                </a>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Add/Edit Form -->
            <div class="lg:col-span-1">
                <div class="glass-card p-6 sticky top-8">
                    <h2 id="form-title" class="text-xl font-bold mb-6 text-[#C59D5F]">إضافة منتج جديد</h2>
                    <form id="product-form" class="space-y-4">
                        <input type="hidden" id="product-id">
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">اسم المنتج</label>
                            <input type="text" id="product-name" class="input-field" required placeholder="مثلاً: لاتيه كراميل">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">السعر (ج.م)</label>
                            <input type="number" id="product-price" class="input-field" required placeholder="0">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">الفئة</label>
                            <div class="relative">
                                <select id="product-category" class="input-field appearance-none pr-10 cursor-pointer">
                                    <option value="hot">☕ مشروبات ساخنة</option>
                                    <option value="cold">🧊 مشروبات باردة</option>
                                    <option value="sweets">🍰 حلويات</option>
                                    <option value="snacks">🥐 سناكس</option>
                                </select>
                                <div class="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none text-[#C59D5F]">
                                    <i class="fa-solid fa-chevron-down text-sm"></i>
                                </div>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">صورة المنتج (رابط أو رفع)</label>
                            <div class="space-y-3">
                                <input type="url" id="product-image" class="input-field" placeholder="ضع رابط الصورة هنا...">
                                <div class="relative">
                                    <input type="file" id="product-file" class="hidden" accept="image/*">
                                    <button type="button" onclick="document.getElementById('product-file').click()" class="w-full py-2 px-4 border-2 border-dashed border-white/10 rounded-xl text-gray-400 hover:border-[#C59D5F] hover:text-[#C59D5F] transition-all flex items-center justify-center gap-2 bg-white/5">
                                        <i class="fa-solid fa-cloud-arrow-up"></i>
                                        <span id="file-name">أو اختر صورة من جهازك</span>
                                    </button>
                                </div>
                                <div id="image-preview-container" class="hidden">
                                    <img id="image-preview" src="" class="w-full h-32 object-cover rounded-xl border border-white/10">
                                </div>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">الوصف (اختياري)</label>
                            <textarea id="product-description" class="input-field" rows="2" placeholder="وصف مختصر للمنتج..."></textarea>
                        </div>
                        <div class="pt-4 flex gap-2">
                            <button type="submit" class="btn-primary w-full py-3 rounded-xl font-bold hover:opacity-90 transition-opacity">حفظ المنتج</button>
                            <button type="button" id="cancel-edit" class="hidden bg-gray-800 w-full py-3 rounded-xl font-bold hover:bg-gray-700 transition-colors">إلغاء</button>
                        </div>
                    </form>
                </div>

            </div>

            <!-- QR Code Modal -->
            <div id="qr-modal" class="fixed inset-0 bg-black/90 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-md">
                <div class="glass-card max-w-sm w-full p-8 text-center relative border border-white/10">
                    <button onclick="toggleQRModal()" class="absolute top-4 left-4 text-gray-400 hover:text-white transition-colors">
                        <i class="fa-solid fa-xmark text-2xl"></i>
                    </button>
                    
                    <h3 class="text-2xl font-bold mb-6">QR Code المنيو</h3>
                    
                    <div class="bg-white p-6 rounded-3xl inline-block mb-6 shadow-2xl">
                        <div id="qrcode"></div>
                    </div>
                    
                    <p class="text-gray-400 text-sm mb-8 leading-relaxed">
                        هذا الرمز يوجه العملاء مباشرة إلى صفحة المنيو الخاصة بك. يمكنك تحميله وطباعته على الطاولات.
                    </p>
                    
                    <button onclick="downloadQR()" class="btn-primary w-full py-4 rounded-2xl font-bold flex items-center justify-center gap-3 text-lg">
                        <i class="fa-solid fa-cloud-arrow-down"></i>
                        تحميل الصورة (PNG)
                    </button>
                </div>
            </div>

            <!-- Products List -->
            <div class="lg:col-span-2">
                <div class="glass-card p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold">قائمة المنتجات</h2>
                        <div class="flex gap-3 items-center">
                            <span id="product-count" class="bg-[#C59D5F]/20 text-[#C59D5F] px-3 py-1 rounded-full text-sm font-bold">0 منتج</span>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-right">
                            <thead>
                                <tr class="text-gray-400 border-b border-white/5">
                                    <th class="pb-4 font-medium">المنتج</th>
                                    <th class="pb-4 font-medium">الفئة</th>
                                    <th class="pb-4 font-medium">السعر</th>
                                    <th class="pb-4 font-medium text-left">إجراءات</th>
                                </tr>
                            </thead>
                            <tbody id="products-table-body" class="divide-y divide-white/5">
                                <!-- Products will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://gtamikjyzuhceqejikme.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0YW1pa2p5enVoY2VxZWppa21lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MTExNDQsImV4cCI6MjA5Mjk4NzE0NH0.DH47zEnjd7OCTz6Hy9TMbBCmj1jlOotN8Dg4Yh4FfFM';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Default Data
        const defaultItems = [
            { id: 1, name: "إسبريسو", price: 35, category: "hot", image: "https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?auto=format&fit=crop&w=500&q=80" },
            { id: 2, name: "كابتشينو", price: 55, category: "hot", image: "https://images.unsplash.com/photo-1534778101976-62847782c213?auto=format&fit=crop&w=500&q=80" },
            { id: 3, name: "لاتيه", price: 60, category: "hot", image: "https://images.unsplash.com/photo-1570968915860-54d5c301fa9f?auto=format&fit=crop&w=500&q=80" },
            { id: 4, name: "ميكاتو كراميل", price: 65, category: "hot", image: "https://images.unsplash.com/photo-1485808191679-5f86510681a2?auto=format&fit=crop&w=500&q=80" },
            { id: 5, name: "آيس لاتيه", price: 65, category: "cold", image: "https://images.unsplash.com/photo-1461023058943-07fcbe16d735?auto=format&fit=crop&w=500&q=80" },
            { id: 6, name: "سموذي مانجو", price: 70, category: "cold", image: "https://images.unsplash.com/photo-1546173159-315724a31696?auto=format&fit=crop&w=500&q=80" },
            { id: 7, name: "موهيتو ليمون", price: 60, category: "cold", image: "https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?auto=format&fit=crop&w=500&q=80" },
            { id: 8, name: "تشيز كيك", price: 80, category: "sweets", image: "https://images.unsplash.com/photo-1533134242443-d4fd215305ad?auto=format&fit=crop&w=500&q=80" },
            { id: 9, name: "مولتن كيك", price: 85, category: "sweets", image: "https://images.unsplash.com/photo-1624353365286-3f8d62daad51?auto=format&fit=crop&w=500&q=80" },
            { id: 10, name: "كرواسون جبنة", price: 45, category: "snacks", image: "https://images.unsplash.com/photo-1555507036-ab1f4038808a?auto=format&fit=crop&w=500&q=80" },
            { id: 11, name: "ساندوتش دجاج", price: 95, category: "snacks", image: "https://images.unsplash.com/photo-1528735602780-2552fd46c7af?auto=format&fit=crop&w=500&q=80" },
            { id: 12, name: "قهوة تركي", price: 30, category: "hot", image: "https://images.unsplash.com/photo-1544787210-2211dca44367?auto=format&fit=crop&w=500&q=80" }
        ];

        let products = [];
        let isEditing = false;

        const form = document.getElementById('product-form');
        const tableBody = document.getElementById('products-table-body');
        const productCount = document.getElementById('product-count');
        const cancelBtn = document.getElementById('cancel-edit');
        const formTitle = document.getElementById('form-title');
        const productFile = document.getElementById('product-file');
        const fileName = document.getElementById('file-name');
        const imagePreview = document.getElementById('image-preview');
        const imagePreviewContainer = document.getElementById('image-preview-container');

        let selectedFile = null;

        // Handle File Selection and Preview
        productFile.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                fileName.innerText = file.name;
                const reader = new FileReader();
                reader.onload = (e) => {
                    imagePreview.src = e.target.result;
                    imagePreviewContainer.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        // Initial Load
        fetchProducts();

        async function uploadImage(file) {
            try {
                const fileExt = file.name.split('.').pop();
                const fileName = `${Math.random().toString(36).substring(2)}_${Date.now()}.${fileExt}`;
                const filePath = `product-images/${fileName}`;

                const { data, error } = await supabaseClient.storage
                    .from('products')
                    .upload(filePath, file);

                if (error) {
                    if (error.message.includes('bucket not found')) {
                        throw new Error('يرجى إنشاء Storage Bucket باسم "products" في Supabase أولاً');
                    }
                    throw error;
                }

                const { data: { publicUrl } } = supabaseClient.storage
                    .from('products')
                    .getPublicUrl(filePath);

                return publicUrl;
            } catch (err) {
                console.error('Upload error:', err);
                throw err;
            }
        }

        async function fetchProducts() {
            try {
                const { data, error } = await supabaseClient
                    .from('menu_items')
                    .select('*')
                    .order('id', { ascending: true });

                if (error) throw error;
                products = data && data.length > 0 ? data : defaultItems;
                renderProducts();
            } catch (err) {
                console.error('Error fetching:', err);
                products = defaultItems;
                renderProducts();
            }
        }

        function renderProducts() {
            productCount.innerText = `${products.length} منتج`;

            if (products.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" class="py-8 text-center text-gray-500">لا توجد منتجات. اضغط على "استعادة الافتراضي" لإضافة المنتجات.</td></tr>`;
                return;
            }

            tableBody.innerHTML = products.map(item => `
                <tr class="product-card transition-colors group">
                    <td class="py-4 px-2">
                        <div class="flex items-center gap-3">
                            <img src="${item.image || 'https://via.placeholder.com/100x100?text=No+Image'}" class="w-10 h-10 rounded-lg object-cover" onerror="this.src='https://via.placeholder.com/100x100?text=No+Image'">
                            <div>
                                <span class="font-bold block">${item.name}</span>
                                ${item.description ? `<span class="text-xs text-gray-500">${item.description}</span>` : ''}
                            </div>
                        </div>
                    </td>
                    <td class="py-4 text-gray-400 text-sm">
                        ${getCategoryName(item.category)}
                    </td>
                    <td class="py-4 font-bold text-[#C59D5F]">
                        ${item.price} ج.م
                    </td>
                    <td class="py-4 text-left">
                        <div class="flex justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="editProduct(${item.id})" class="p-2 text-blue-400 hover:bg-blue-400/10 rounded-lg transition-colors">
                                <i class="fa-solid fa-pen-to-square"></i>
                            </button>
                            <button onclick="deleteProduct(${item.id})" class="p-2 text-red-400 hover:bg-red-400/10 rounded-lg transition-colors">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function getCategoryName(cat) {
            const names = { hot: 'ساخن', cold: 'بارد', sweets: 'حلويات', snacks: 'سناكس' };
            return names[cat] || cat;
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalBtnText = submitBtn.innerText;
            
            try {
                submitBtn.disabled = true;
                submitBtn.innerText = 'جاري الحفظ...';

                const id = document.getElementById('product-id').value;
                let imageUrl = document.getElementById('product-image').value || null;

                // If a file is selected, upload it first
                if (selectedFile) {
                    imageUrl = await uploadImage(selectedFile);
                }

                const productData = {
                    name: document.getElementById('product-name').value,
                    price: parseInt(document.getElementById('product-price').value),
                    category: document.getElementById('product-category').value,
                    image: imageUrl,
                    description: document.getElementById('product-description').value || null
                };

                if (id) {
                    const { error } = await supabaseClient
                        .from('menu_items')
                        .update(productData)
                        .eq('id', id);
                    if (error) throw error;
                } else {
                    const { error } = await supabaseClient
                        .from('menu_items')
                        .insert([productData]);
                    if (error) throw error;
                }

                resetForm();
                fetchProducts();
                alert('تم حفظ المنتج بنجاح!');
            } catch (err) {
                console.error('Error saving:', err);
                alert(err.message || 'حدث خطأ أثناء الحفظ.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = originalBtnText;
            }
        };

        window.editProduct = (id) => {
            const p = products.find(p => p.id === id);
            if (!p) return;

            document.getElementById('product-id').value = p.id;
            document.getElementById('product-name').value = p.name;
            document.getElementById('product-price').value = p.price;
            document.getElementById('product-category').value = p.category;
            document.getElementById('product-image').value = p.image || '';
            document.getElementById('product-description').value = p.description || '';

            if (p.image) {
                imagePreview.src = p.image;
                imagePreviewContainer.classList.remove('hidden');
            } else {
                imagePreviewContainer.classList.add('hidden');
            }

            formTitle.innerText = 'تعديل المنتج';
            cancelBtn.classList.remove('hidden');
            isEditing = true;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.deleteProduct = async (id) => {
            if (confirm('هل أنت متأكد من حذف هذا المنتج؟')) {
                try {
                    const { error } = await supabaseClient
                        .from('menu_items')
                        .delete()
                        .eq('id', id);
                    if (error) throw error;
                    fetchProducts();
                } catch (err) {
                    console.error('Error deleting:', err);
                    alert('حدث خطأ أثناء الحذف.');
                }
            }
        };

        window.resetToDefaults = async () => {
            if (confirm('هل أنت متأكد من استعادة القائمة الافتراضية؟ سيتم حذف جميع التعديلات الحالية.')) {
                try {
                    const { error: delError } = await supabaseClient
                        .from('menu_items')
                        .delete()
                        .neq('id', 0);
                    if (delError) throw delError;

                    const itemsToInsert = defaultItems.map(({id, ...rest}) => rest);
                    const { error: insError } = await supabaseClient
                        .from('menu_items')
                        .insert(itemsToInsert);
                    if (insError) throw insError;

                    fetchProducts();
                    alert('تم استعادة القائمة الافتراضية بنجاح!');
                } catch (err) {
                    console.error('Error resetting:', err);
                    alert('حدث خطأ أثناء استعادة البيانات.');
                }
            }
        };

        cancelBtn.onclick = resetForm;

        function resetForm() {
            form.reset();
            document.getElementById('product-id').value = '';
            selectedFile = null;
            fileName.innerText = 'أو اختر صورة من جهازك';
            imagePreviewContainer.classList.add('hidden');
            formTitle.innerText = 'إضافة منتج جديد';
            cancelBtn.classList.add('hidden');
            isEditing = false;
        }

        function checkPassword() {
            const password = document.getElementById('admin-password').value;
            if (password === '937312401') {
                document.getElementById('password-overlay').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                document.getElementById('admin-content').classList.add('max-w-6xl', 'mx-auto');
            } else {
                document.getElementById('password-error').classList.remove('hidden');
            }
        }

        document.getElementById('login-btn').addEventListener('click', checkPassword);
        document.getElementById('admin-password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                var p = document.getElementById('admin-password').value;
                if(p==='937312401'){
                    document.getElementById('password-overlay').style.display='none';
                    document.getElementById('admin-content').classList.remove('hidden');
                    document.getElementById('admin-content').classList.add('max-w-6xl','mx-auto');
                }else{
                    document.getElementById('password-error').classList.remove('hidden');
                }
            }
        });

        // QR Code Generation
        const siteURL = window.location.origin;
        const qr = new QRCode(document.getElementById("qrcode"), {
            text: siteURL,
            width: 220,
            height: 220,
            colorDark: "#1a1208",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        function toggleQRModal() {
            const modal = document.getElementById('qr-modal');
            modal.classList.toggle('hidden');
        }

        function downloadQR() {
            const canvas = document.querySelector("#qrcode canvas");
            if (!canvas) {
                // For browsers that use img instead of canvas (like older mobile)
                const img = document.querySelector("#qrcode img");
                if (img) {
                    const link = document.createElement("a");
                    link.download = "7eleven-qr-code.png";
                    link.href = img.src;
                    link.click();
                }
                return;
            }
            const link = document.createElement("a");
            link.download = "7eleven-qr-code.png";
            link.href = canvas.toDataURL("image/png");
            link.click();
        }
    </script>
</body>
</html>
