<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7eleven Cafe - 7 إيليفن كافيه</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            scroll-behavior: smooth;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }

        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('bg.jpg');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        .btn-primary {
            background: linear-gradient(45deg, #C59D5F, #4B2C20);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(197, 157, 95, 0.3);
        }

        .cart-sidebar {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .category-pill.active {
            background-color: #C59D5F;
            color: white;
            border-color: #C59D5F;
        }

        /* Mobile Optimization Fixes */
        @media (max-width: 640px) {
            .hero-bg {
                background-attachment: scroll; /* Fixes performance on mobile */
                background-position: center center; /* Center the logo on mobile */
                background-size: cover;
                background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('bg.jpg'); /* Slightly darker on mobile for better text readability */
            }
            .category-container {
                overflow-x: auto;
                white-space: nowrap;
                padding-bottom: 10px;
                justify-content: flex-start !important;
                -webkit-overflow-scrolling: touch;
            }
            .category-pill {
                flex: 0 0 auto;
            }
        }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        .cart-bounce {
            animation: bounce 0.4s ease;
        }
    </style>
</head>
<body class="hide-scrollbar">

    <!-- Header / Navbar -->
    <nav class="fixed top-0 w-full z-50 glass-card rounded-none border-t-0 border-x-0 bg-black/50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="logo.jpg" alt="7eleven Logo" class="h-12 w-12 rounded-full object-cover border-2 border-[#C59D5F]">
            <h1 class="text-2xl font-bold tracking-wider">7<span class="text-[#C59D5F]">eleven</span></h1>
        </div>
        
        <div class="relative cursor-pointer" onclick="toggleCart()">
            <i class="fa-solid fa-cart-shopping text-2xl hover:text-[#C59D5F] transition-colors"></i>
            <span id="cart-count" class="absolute -top-2 -right-2 bg-[#C59D5F] text-white text-xs rounded-full h-5 w-5 flex items-center justify-center font-bold">0</span>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-bg min-h-screen flex flex-col justify-center items-center text-center px-6 py-20">
        <img src="logo.jpg" data-aos="zoom-in" class="w-56 h-56 sm:w-72 sm:h-72 md:w-96 md:h-96 rounded-full mb-8 border-4 border-[#C59D5F] shadow-2xl object-cover">
        <h2 data-aos="fade-up" class="text-3xl sm:text-4xl md:text-6xl font-extrabold mb-4 leading-tight">أهلاً بك في <span class="text-[#C59D5F]">7</span><span class="text-[#F1C40F]">eleven</span> كافيه</h2>
        <p data-aos="fade-up" data-aos-delay="200" class="text-2xl sm:text-3xl md:text-5xl font-bold text-white mb-10 italic">Sip. Relax. Repeat</p>
        <a href="#menu" data-aos="fade-up" data-aos-delay="400" class="btn-primary px-8 py-3 sm:px-10 sm:py-4 rounded-full text-lg sm:text-xl font-bold shadow-lg">تصفح المنيو</a>
    </section>

    <!-- Menu Section -->
    <section id="menu" class="py-16 sm:py-24 px-4 sm:px-6 max-w-7xl mx-auto">
        <div class="text-center mb-12 sm:mb-16">
            <h3 class="text-3xl sm:text-4xl md:text-5xl font-bold mb-4" data-aos="fade-down">قائمة الطعام</h3>
            <div class="w-20 sm:w-24 h-1.5 bg-[#C59D5F] mx-auto mb-8 rounded-full"></div>
            
            <!-- Categories -->
            <div class="category-container flex flex-wrap justify-center gap-3 sm:gap-4 mb-8 sm:mb-12 hide-scrollbar" data-aos="fade-up">
                <button onclick="filterMenu('all')" class="category-pill active px-5 py-2 sm:px-6 sm:py-2.5 rounded-full border border-gray-700 hover:border-[#C59D5F] transition-all text-sm sm:text-base">الكل</button>
                <button onclick="filterMenu('hot')" class="category-pill px-5 py-2 sm:px-6 sm:py-2.5 rounded-full border border-gray-700 hover:border-[#C59D5F] transition-all text-sm sm:text-base">مشروبات ساخنة</button>
                <button onclick="filterMenu('cold')" class="category-pill px-5 py-2 sm:px-6 sm:py-2.5 rounded-full border border-gray-700 hover:border-[#C59D5F] transition-all text-sm sm:text-base">مشروبات باردة</button>
                <button onclick="filterMenu('sweets')" class="category-pill px-5 py-2 sm:px-6 sm:py-2.5 rounded-full border border-gray-700 hover:border-[#C59D5F] transition-all text-sm sm:text-base">حلويات</button>
                <button onclick="filterMenu('snacks')" class="category-pill px-5 py-2 sm:px-6 sm:py-2.5 rounded-full border border-gray-700 hover:border-[#C59D5F] transition-all text-sm sm:text-base">سناك</button>
            </div>
        </div>

        <!-- Menu Items Grid -->
        <div id="menu-grid" class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-8">
            <!-- Items will be injected here by JS -->
        </div>
    </section>

    <!-- Cart Sidebar -->
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full md:w-96 bg-[#0f0f0f] shadow-2xl -translate-x-full cart-sidebar border-l border-gray-800 invisible">
        <div class="p-6 flex flex-col h-full">
            <div class="flex justify-between items-center mb-8">
                <h4 class="text-2xl font-bold">طلباتك</h4>
                <button onclick="toggleCart()" class="text-2xl hover:text-red-500 transition-colors"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <div id="cart-items" class="flex-grow overflow-y-auto hide-scrollbar space-y-4">
                <!-- Cart items will be injected here -->
                <div class="text-center text-gray-500 mt-10">السلة فارغة حالياً</div>
            </div>

            <div class="mt-4 pt-4 border-t border-gray-800 space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">رقم الطاولة</label>
                    <select id="table-number" class="w-full bg-black/30 border border-gray-700 rounded-lg p-2 text-white focus:outline-none focus:border-[#C59D5F]">
                        <option value="">اختر رقم الطاولة</option>
                        <option value="1">طاولة 1</option>
                        <option value="2">طاولة 2</option>
                        <option value="3">طاولة 3</option>
                        <option value="4">طاولة 4</option>
                        <option value="5">طاولة 5</option>
                        <option value="6">طاولة 6</option>
                        <option value="7">طاولة 7</option>
                        <option value="8">طاولة 8</option>
                        <option value="9">طاولة 9</option>
                        <option value="10">طاولة 10</option>
                        <option value="takeaway">سفري / Takeaway</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">ملاحظات إضافية</label>
                    <textarea id="order-notes" rows="2" class="w-full bg-black/30 border border-gray-700 rounded-lg p-2 text-white focus:outline-none focus:border-[#C59D5F]" placeholder="أي طلبات خاصة؟ (مثلاً: سكر زيادة)"></textarea>
                </div>
            </div>

            <div class="mt-4 pt-4 border-t border-gray-800">
                <div class="flex justify-between text-xl font-bold mb-6">
                    <span>الإجمالي:</span>
                    <span><span id="cart-total">0</span> ج.م</span>
                </div>
                <button onclick="checkout()" class="w-full btn-primary py-4 rounded-xl text-lg font-bold">تأكيد الطلب</button>
            </div>
        </div>
    </div>

    <!-- Floating Cart Button for Mobile -->
    <div class="fixed bottom-6 right-6 z-50 md:hidden">
        <button onclick="toggleCart()" class="btn-primary w-16 h-16 rounded-full shadow-2xl flex items-center justify-center">
            <i class="fa-solid fa-cart-shopping text-2xl"></i>
            <span id="cart-count-mobile" class="absolute top-0 right-0 bg-white text-black text-xs rounded-full h-6 w-6 flex items-center justify-center font-bold">0</span>
        </button>
    </div>

    <!-- Footer -->
    <footer class="py-12 bg-black border-t border-gray-900 text-center">
        <div class="flex justify-center items-center gap-3 mb-6">
            <img src="logo.jpg" alt="7eleven Logo" class="h-10 w-10 rounded-full object-cover">
            <h1 class="text-xl font-bold">7<span class="text-[#C59D5F]">eleven</span></h1>
        </div>
        <p class="text-gray-500">&copy; 2026 7eleven Cafe. جميع الحقوق محفوظة.</p>
    </footer>

    <!-- Success Modal -->
    <div id="success-modal" class="fixed inset-0 bg-black/90 z-[2000] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="glass-card max-w-sm w-full p-8 text-center transform scale-90 opacity-0 transition-all duration-300" id="success-modal-content">
            <div class="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-check text-4xl text-green-500"></i>
            </div>
            <h3 class="text-2xl font-bold mb-4">تم تأكيد طلبك</h3>
            <p class="text-gray-300 leading-relaxed mb-8">
                طلبك الآن قيد التحضير وسوف نقوم بتقديمه في أسرع وقت ممكن.
            </p>
            <button onclick="closeSuccessModal()" class="btn-primary w-full py-3 rounded-xl font-bold">شكراً لك</button>
        </div>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://gtamikjyzuhceqejikme.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0YW1pa2p5enVoY2VxZWppa21lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MTExNDQsImV4cCI6MjA5Mjk4NzE0NH0.DH47zEnjd7OCTz6Hy9TMbBCmj1jlOotN8Dg4Yh4FfFM';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Initialize AOS
        AOS.init({
            duration: 800,
            once: true
        });

        // Menu Data
        const defaultItems = [
            { id: 1, name: "إسبريسو", price: 35, category: "hot", image: "https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?auto=format&fit=crop&w=500&q=80" },
            { id: 2, name: "كابتشينو", price: 55, category: "hot", image: "https://images.unsplash.com/photo-1534778101976-62847782c213?auto=format&fit=crop&w=500&q=80" },
            { id: 3, name: "لاتيه", price: 60, category: "hot", image: "https://images.unsplash.com/photo-1570968915860-54d5c301fa9f?auto=format&fit=crop&w=500&q=80" },
            { id: 4, name: "ميكاتو كراميل", price: 65, category: "hot", image: "https://images.unsplash.com/photo-1485808191679-5f86510681a2?auto=format&fit=crop&w=500&q=80" },
            { id: 5, name: "آيس لاتيه", price: 65, category: "cold", image: "https://images.unsplash.com/photo-1461023058943-07fcbe16d735?auto=format&fit=crop&w=500&q=80" },
            { id: 6, name: "سموذي مانجو", price: 70, category: "cold", image: "https://images.unsplash.com/photo-1546173159-315724a31696?auto=format&fit=crop&w=500&q=80" },
            { id: 7, name: "موهيتو ليمون", price: 60, category: "cold", image: "https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?auto=format&fit=crop&w=500&q=80" },
            { id: 8, name: "تشيز كيك", price: 80, category: "sweets", image: "https://images.unsplash.com/photo-1533134242443-d4fd215305ad?auto=format&fit=crop&w=500&q=80" },
            { id: 9, name: "مولتن كيك", price: 85, category: "sweets", image: "https://images.unsplash.com/photo-1624353365286-3f8d62daad51?auto=format&fit=crop&w=500&q=80" },
            { id: 10, name: "كرواسون جبنة", price: 45, category: "snacks", image: "https://images.unsplash.com/photo-1555507036-ab1f4038808a?auto=format&fit=crop&w=500&q=80" },
            { id: 11, name: "ساندوتش دجاج", price: 95, category: "snacks", image: "https://images.unsplash.com/photo-1528735602780-2552fd46c7af?auto=format&fit=crop&w=500&q=80" },
            { id: 12, name: "قهوة تركي", price: 30, category: "hot", image: "https://images.unsplash.com/photo-1544787210-2211dca44367?auto=format&fit=crop&w=500&q=80" }
        ];

        let menuItems = [];
        let cart = [];

        // Fetch Menu from Supabase
        async function fetchMenu() {
            try {
                const { data, error } = await supabaseClient
                    .from('menu_items')
                    .select('*')
                    .order('id', { ascending: true });

                if (error) throw error;
                menuItems = data.length > 0 ? data : defaultItems;
                renderMenu(menuItems);
            } catch (err) {
                console.error('Error fetching menu:', err);
                menuItems = defaultItems;
                renderMenu(menuItems);
            }
        }

        // Initial Render
        fetchMenu();

        // Render Menu
        function renderMenu(items) {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = items.map(item => `
                <div class="glass-card overflow-hidden group" data-aos="fade-up">
                    <div class="relative h-48 sm:h-64 overflow-hidden">
                        <img src="${item.image || 'https://via.placeholder.com/500x500?text=No+Image'}" alt="${item.name}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" onerror="this.src='https://via.placeholder.com/500x500?text=No+Image'">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <button onclick="addToCart(${item.id})" class="btn-primary px-4 py-2 sm:px-6 sm:py-2 rounded-full font-bold text-sm sm:text-base">إضافة</button>
                        </div>
                    </div>
                    <div class="p-3 sm:p-6">
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-2 gap-1">
                            <h5 class="text-base sm:text-xl font-bold line-clamp-1">${item.name}</h5>
                            <span class="text-[#C59D5F] font-bold text-sm sm:text-lg">${item.price} ج.م</span>
                        </div>
                        <p class="text-gray-400 text-xs sm:text-sm line-clamp-2">${item.description || 'مشروب محضر بعناية من أجود المكونات.'}</p>
                    </div>
                </div>
            `).join('');
        }

        // Filter Menu
        function filterMenu(category) {
            // Update UI
            document.querySelectorAll('.category-pill').forEach(btn => {
                btn.classList.remove('active');
            });
            event.currentTarget.classList.add('active');

            // Filter logic
            const filtered = category === 'all' ? menuItems : menuItems.filter(i => i.category === category);
            renderMenu(filtered);
        }

        // Cart Logic
        function playSuccessFeedback() {
            // Vibration for mobile
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }

            // Visual feedback (bounce effect)
            const cartCounts = [document.getElementById('cart-count'), document.getElementById('cart-count-mobile')];
            cartCounts.forEach(el => {
                if (el) {
                    el.classList.remove('cart-bounce');
                    void el.offsetWidth; // Trigger reflow
                    el.classList.add('cart-bounce');
                    setTimeout(() => el.classList.remove('cart-bounce'), 400);
                }
            });

            // Sound feedback using Web Audio API (no external file needed)
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);

                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } catch (e) {
                console.log('Audio feedback not supported');
            }
        }

        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            const isClosed = sidebar.classList.contains('-translate-x-full');
            
            if (isClosed) {
                // Open
                sidebar.classList.remove('invisible');
                setTimeout(() => {
                    sidebar.classList.remove('-translate-x-full');
                    sidebar.classList.add('translate-x-0');
                }, 10);
            } else {
                // Close
                sidebar.classList.add('-translate-x-full');
                sidebar.classList.remove('translate-x-0');
                setTimeout(() => {
                    sidebar.classList.add('invisible');
                }, 400);
            }
        }

        function addToCart(id) {
            const item = menuItems.find(i => i.id === id);
            const existing = cart.find(i => i.id === id);

            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ ...item, quantity: 1 });
            }

            playSuccessFeedback();
            updateCart();
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            updateCart();
        }

        function changeQuantity(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    removeFromCart(id);
                } else {
                    updateCart();
                }
            }
        }

        function updateCart() {
            const cartContainer = document.getElementById('cart-items');
            const cartCount = document.getElementById('cart-count');
            const cartCountMobile = document.getElementById('cart-count-mobile');
            const cartTotal = document.getElementById('cart-total');

            const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCount.innerText = totalCount;
            if(cartCountMobile) cartCountMobile.innerText = totalCount;

            if (cart.length === 0) {
                cartContainer.innerHTML = '<div class="text-center text-gray-500 mt-10">السلة فارغة حالياً</div>';
                cartTotal.innerText = '0';
                return;
            }
            
            cartContainer.innerHTML = cart.map(item => `
                <div class="glass-card p-4 flex items-center gap-4">
                    <img src="${item.image}" class="w-16 h-16 rounded-lg object-cover">
                    <div class="flex-grow">
                        <h6 class="font-bold">${item.name}</h6>
                        <span class="text-sm text-[#C59D5F]">${item.price} ج.م</span>
                    </div>
                    <div class="flex flex-col items-center gap-2">
                        <div class="flex items-center gap-3 bg-black/30 rounded-lg px-2 py-1">
                            <button onclick="changeQuantity(${item.id}, 1)" class="hover:text-[#C59D5F]"><i class="fa-solid fa-plus text-xs"></i></button>
                            <span class="font-bold">${item.quantity}</span>
                            <button onclick="changeQuantity(${item.id}, -1)" class="hover:text-red-500"><i class="fa-solid fa-minus text-xs"></i></button>
                        </div>
                        <button onclick="removeFromCart(${item.id})" class="text-xs text-red-500 hover:underline">حذف</button>
                    </div>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            cartTotal.innerText = total;
        }

        function showSuccessModal() {
            const modal = document.getElementById('success-modal');
            const content = document.getElementById('success-modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-90', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeSuccessModal() {
            const modal = document.getElementById('success-modal');
            const content = document.getElementById('success-modal-content');
            content.classList.add('scale-90', 'opacity-0');
            content.classList.remove('scale-100', 'opacity-100');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        async function checkout() {
            if (cart.length === 0) return;
            
            const tableNum = document.getElementById('table-number').value;
            const notes = document.getElementById('order-notes').value;

            if (!tableNum) {
                alert('يرجى اختيار رقم الطاولة أو سفري لتأكيد الطلب');
                const select = document.getElementById('table-number');
                select.focus();
                select.classList.add('border-red-500');
                setTimeout(() => select.classList.remove('border-red-500'), 2000);
                return;
            }

            const checkoutBtn = event.target;
            const originalText = checkoutBtn.innerText;
            
            try {
                checkoutBtn.disabled = true;
                checkoutBtn.innerText = 'جاري إرسال الطلب...';

                const orderData = {
                    table_number: tableNum,
                    items: cart,
                    notes: notes.trim(),
                    total: parseFloat(document.getElementById('cart-total').innerText),
                    status: 'pending',
                    created_at: new Date().toISOString()
                };

                const { error } = await supabaseClient
                    .from('orders')
                    .insert([orderData]);

                if (error) throw error;

                // Success Feedback - Show Professional Modal
                showSuccessModal();
                
                // Reset cart and fields
                cart = [];
                document.getElementById('table-number').value = '';
                document.getElementById('order-notes').value = '';
                updateCart();
                toggleCart();

            } catch (err) {
                console.error('Order error:', err);
                alert('حدث خطأ أثناء إرسال الطلب. يرجى المحاولة مرة أخرى أو إبلاغ الموظف.');
            } finally {
                checkoutBtn.disabled = false;
                checkoutBtn.innerText = originalText;
            }
        }

    </script>
</body>
</html>
